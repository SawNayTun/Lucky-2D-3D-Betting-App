<div class="absolute inset-0 z-50 bg-black flex flex-col">
  <!-- Header -->
  <div class="px-4 py-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0" style="padding-top: calc(0.75rem + env(safe-area-inset-top));">
    <h2 class="font-black text-amber-400 text-sm uppercase tracking-wider">Scan Sheet / QR</h2>
    <button (click)="closeScanner()" class="text-slate-400 hover:text-white">
      <app-x-circle-icon [size]="24"></app-x-circle-icon>
    </button>
  </div>

  <div class="flex-1 relative overflow-hidden bg-black flex flex-col">
    <!-- Camera View -->
    @if (!capturedImage()) {
      <div class="relative flex-1 bg-black flex items-center justify-center overflow-hidden">
        
        <!-- Live Camera Stream (If permissions allow) -->
        <video #video autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover opacity-60"></video>
        
        <!-- Capture Overlay / Guide -->
        <div class="absolute inset-0 pointer-events-none border-2 border-amber-500/30 m-8 rounded-3xl z-10">
          <div class="absolute top-0 left-0 w-4 h-4 border-t-4 border-l-4 border-amber-500 -mt-0.5 -ml-0.5 rounded-tl-lg"></div>
          <div class="absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 border-amber-500 -mt-0.5 -mr-0.5 rounded-tr-lg"></div>
          <div class="absolute bottom-0 left-0 w-4 h-4 border-b-4 border-l-4 border-amber-500 -mb-0.5 -ml-0.5 rounded-bl-lg"></div>
          <div class="absolute bottom-0 right-0 w-4 h-4 border-b-4 border-r-4 border-amber-500 -mb-0.5 -mr-0.5 rounded-br-lg"></div>
        </div>
        
        <!-- Center Content -->
        <div class="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none">
            @if (hasPermission() === false) {
                <p class="text-rose-500 font-bold mb-4 bg-black/50 px-3 py-1 rounded">Camera Unavailable</p>
            }
        </div>

        <!-- Controls Container -->
        <div class="absolute bottom-0 left-0 right-0 pb-safe bg-gradient-to-t from-black/90 to-transparent pt-10 pb-6 px-6 z-30">
            <div class="flex items-end justify-center gap-4">
                
                <!-- 1. System Camera Button (Main Solution) -->
                <button (click)="triggerSystemCamera()" class="flex flex-col items-center gap-1 group">
                    <div class="w-14 h-14 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform group-active:border-amber-500">
                        <app-camera-icon [size]="24"></app-camera-icon>
                    </div>
                    <span class="text-[10px] font-bold text-slate-300 uppercase">Phone Cam</span>
                </button>

                <!-- 2. Live Capture Button -->
                <button (click)="capture()" class="w-20 h-20 rounded-full bg-white border-4 border-slate-300 flex items-center justify-center active:scale-95 transition-transform shadow-lg shadow-black/50 mx-2">
                    <div class="w-16 h-16 rounded-full bg-amber-500 border-2 border-white"></div>
                </button>

                <!-- 3. Gallery Upload -->
                <button (click)="triggerFileUpload()" class="flex flex-col items-center gap-1 group">
                    <div class="w-14 h-14 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform group-active:border-amber-500">
                        <app-image-icon [size]="24"></app-image-icon>
                    </div>
                    <span class="text-[10px] font-bold text-slate-300 uppercase">Gallery</span>
                </button>
            </div>
            <p class="text-center text-[10px] text-slate-500 mt-4">ဘယ်/ညာ ခလုတ်များကိုနှိပ်၍ ဖုန်းကင်မရာ (သို့) ပုံရွေးပါ</p>
        </div>

      </div>
    } @else {
      <!-- Review & Edit View -->
      <div class="flex-1 flex flex-col bg-slate-950">
        <div class="h-48 bg-black relative shrink-0 border-b border-slate-800">
           <img [src]="capturedImage()" class="w-full h-full object-contain opacity-50">
           @if(isProcessing()) {
             <div class="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm">
                <div class="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-3"></div>
                <p class="text-amber-400 font-black text-xs animate-pulse">Reading content...</p>
             </div>
           }
           <button (click)="retry()" class="absolute bottom-2 right-2 bg-slate-800 text-white text-[10px] font-bold px-3 py-1.5 rounded-full border border-slate-600 hover:bg-slate-700">
             Retake
           </button>
        </div>

        <div class="flex-1 flex flex-col p-4 overflow-hidden">
          <div class="flex justify-between items-center mb-2">
            <label class="text-xs font-bold text-slate-400 uppercase">Extracted Text</label>
            @if(error()) {
              <span class="text-xs text-rose-500 font-bold">{{ error() }}</span>
            }
          </div>
          <textarea 
            class="flex-1 w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white font-mono text-sm leading-relaxed outline-none focus:border-amber-500 resize-none transition-colors"
            [value]="scannedText()"
            (input)="scannedText.set($any($event.target).value)"
            placeholder="Result will appear here..."
          ></textarea>
          
          <div class="grid grid-cols-2 gap-3 mt-4">
             <button (click)="copyText()" class="bg-slate-800 border border-slate-700 text-white py-3 rounded-xl font-black text-sm flex items-center justify-center gap-2 active:bg-slate-700">
               <app-copy-icon [size]="18"></app-copy-icon> Copy
             </button>
             <button (click)="shareText()" class="bg-amber-600 text-white py-3 rounded-xl font-black text-sm flex items-center justify-center gap-2 active:bg-amber-500 shadow-lg shadow-amber-600/20">
               <app-share-icon [size]="18"></app-share-icon> Share
             </button>
          </div>
        </div>
      </div>
    }
    
    <!-- Hidden Elements -->
    <canvas #canvas class="hidden"></canvas>
    
    <!-- File Input: Gallery -->
    <input #fileInput type="file" accept="image/*" class="hidden" (change)="handleFile($event)">
    
    <!-- File Input: System Camera (Forces Camera App) -->
    <input #cameraInput type="file" accept="image/*" capture="environment" class="hidden" (change)="handleFile($event)">
  </div>
</div>
