
<div class="h-[100dvh] bg-black flex flex-col items-center justify-center p-6 text-white">
  <div class="w-full max-w-sm bg-slate-900 border border-slate-800 border-t-4 border-t-amber-500 p-8 rounded-3xl text-center">
    @switch(mode()) {
      @case('token') {
        <app-world-icon class="mx-auto mb-4 text-amber-400" [size]="48"></app-world-icon>
        <h1 class="text-xl font-black mb-2">{{ shopName() }}</h1>
        <textarea 
          placeholder="Login Token ရိုက်ထည့်ပါ"
          class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mb-4 text-center text-white outline-none font-mono text-xs focus:border-amber-500 transition-colors h-24 resize-none"
          [value]="loginInput()"
          (input)="loginInput.set($any($event.target).value); onInputChange()"
        ></textarea>
        <button (click)="onTokenLogin()" class="w-full bg-amber-600 p-4 rounded-xl font-black disabled:bg-slate-700 hover:bg-amber-500 transition-colors" [disabled]="isLoggingIn()">
          @if (isLoggingIn()) {
            <span>စစ်ဆေးနေပါသည်...</span>
          } @else {
            <span>အကောင့်ဝင်မည်</span>
          }
        </button>
      }
      @case('pin') {
        <app-shield-check-icon class="mx-auto mb-4 text-amber-400" [size]="48"></app-shield-check-icon>
        <h1 class="text-lg font-black text-white">Bentornato,</h1>
        <p class="text-xl font-bold text-amber-400 mb-4">{{ currentUser()?.name }}</p>
        <input 
          type="password" 
          placeholder="PIN ရိုက်ထည့်ပါ"
          inputmode="numeric"
          class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl mb-4 text-center text-white outline-none font-black text-2xl tracking-[.5em] focus:border-amber-500 transition-colors"
          [value]="pinInput()"
          (input)="pinInput.set($any($event.target).value); onInputChange()"
          (keydown.enter)="onPinLogin()"
        />
        <button (click)="onPinLogin()" class="w-full bg-amber-600 p-4 rounded-xl font-black disabled:bg-slate-700 hover:bg-amber-500 transition-colors" [disabled]="isLoggingIn()">
          @if (isLoggingIn()) {
            <span>စစ်ဆေးနေပါသည်...</span>
          } @else {
            <span>အကောင့်ဝင်မည်</span>
          }
        </button>
        <button (click)="logout.emit()" class="text-slate-500 text-xs mt-6 hover:text-slate-300 transition-colors">အကောင့်ပြောင်းမည်</button>
      }
      @case('set-pin') {
        <app-shield-check-icon class="mx-auto mb-4 text-amber-400" [size]="48"></app-shield-check-icon>
        <h1 class="text-lg font-black text-white">အလွယ်တကူဝင်ရောက်ရန်</h1>
        <p class="text-sm text-slate-400 mb-4">PIN နံပါတ်တစ်ခု ပြုလုပ်ပါ</p>
        <input 
          type="password" 
          placeholder="PIN အသစ်"
          inputmode="numeric"
          class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mb-2 text-center text-white outline-none font-black text-xl tracking-[.5em] focus:border-amber-500 transition-colors"
          [value]="pinInput()"
          (input)="pinInput.set($any($event.target).value)"
        />
        <input 
          type="password" 
          placeholder="PIN အတည်ပြုပါ"
          inputmode="numeric"
          class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mb-4 text-center text-white outline-none font-black text-xl tracking-[.5em] focus:border-amber-500 transition-colors"
          [value]="pinConfirmInput()"
          (input)="pinConfirmInput.set($any($event.target).value)"
          (keydown.enter)="onSetPin()"
        />
        <button (click)="onSetPin()" class="w-full bg-amber-600 p-4 rounded-xl font-black hover:bg-amber-500 transition-colors">
          <span>PIN သိမ်းဆည်းမည်</span>
        </button>
        <button (click)="skipPin.emit()" class="text-slate-500 text-xs mt-6 hover:text-slate-300 transition-colors">ကျော်သွားမည်</button>
      }
    }
    @if (loginError()) {
      <p class="text-rose-500 text-xs mt-4">{{ loginError() }}</p>
    }
  </div>
</div>
